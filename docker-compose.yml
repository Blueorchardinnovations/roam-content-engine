services:
  postgres:
    image: postgres:17
    container_name: roam-content-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: roam_content
      POSTGRES_USER: roam_content
      POSTGRES_PASSWORD: roam_content_dev
    ports:
      - "5432:5432"
    volumes:
      - roam_content_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roam_content -d roam_content"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  roam_content_postgres_data: